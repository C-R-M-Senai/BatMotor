# Blueprint Render — Web Service Node (API BatMotor)
# Documentação: https://render.com/docs/blueprint-spec
#
# Este ficheiro deve ficar na RAIZ do Git (monorepo). Não coloque dentro de backend/.
# O campo rootDir: backend diz ao Render que build/start correm nessa subpasta.
#
# Ajuste o nome do serviço (aparece na URL *.onrender.com) e o plano conforme a conta.
#
# OBRIGATÓRIO no painel Environment (não versionar segredos no Git):
#   DATABASE_URL = mysql://USER:PASS@HOST_NA_NUVEM:3306/NOME_BD
#   — NUNCA localhost, 127.0.0.1 nem porta 3307 (isso é só o Docker no teu PC).
#   JWT_SECRET, CORS_ORIGINS (URL do front). Opcional: SHADOW_DATABASE_URL (só se o Prisma pedir).

services:
  - type: web
    # Troque o nome se criar um serviço novo no Render (nova URL).
    name: batmotor-api
    runtime: node
    rootDir: backend
    # migrate deploy aplica migrações; db seed cria dados iniciais (admin, perfis, etc.)
    buildCommand: npm install && npm run build && npm run release
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "22.12.0"
